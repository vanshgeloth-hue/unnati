<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            background: linear-gradient(to right, #2c3e50, #4ca1af);\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            color: #fff;\n            font-family: 'Arial', sans-serif;\n        }\n        .clock {\n            border: 2px solid #fff;\n            padding: 20px;\n            border-radius: 10px;\n            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);\n            text-align: center;\n            background-color: rgba(0, 0, 0, 0.7);\n            animation: fadeIn 1s;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; }\n            to { opacity: 1; }\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <h1>Digital Clock</h1>\n        <div id="time"></div>\n        <script>\n            function updateClocks() {\n                const utcDate = new Date();\n                const istDate = new Date(utcDate.getTime() + 5 * 60 * 60 * 1000 + 30 * 60 * 1000);\n                const estDate = new Date(utcDate.getTime() - 5 * 60 * 60 * 1000);\n                const pstDate = new Date(utcDate.getTime() - 8 * 60 * 60 * 1000);\n                const gmtDate = utcDate;\n                const jstDate = new Date(utcDate.getTime() + 9 * 60 * 60 * 1000);\n\n                document.getElementById('time').innerHTML = \`<p>UTC: \\${utcDate.toUTCString().substring(17, 25)}</p>\n                <p>IST: \\${istDate.toLocaleTimeString('en-IN')}</p>\n                <p>EST: \\${estDate.toLocaleTimeString('en-US')}</p>\n                <p>PST: \\${pstDate.toLocaleTimeString('en-US')}</p>\n                <p>GMT: \\${gmtDate.toUTCString().substring(17, 25)}</p>\n                <p>JST: \\${jstDate.toLocaleTimeString('en-JP')}</p>\n                \`;\n            }\n            setInterval(updateClocks, 1000);\n            updateClocks(); // initial call to display immediately\n        <\/script>\n    </div>\n</body>\n</html>\n
